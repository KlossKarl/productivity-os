# Second Brain Configuration
# Add/remove paths freely, then run: python second_brain.py --index

# Your Obsidian vault(s)
vaults:
  - C:\Users\Karl\Documents\Obsidian Vault

# Codebases to index — add any repo you want queryable
codebases:
  - C:\Users\Karl\Documents\productivity-os
  # - C:\Users\Karl\Documents\your-other-repo   # uncomment to add

# File types to index from codebases
code_extensions:
  - .py
  - .js
  - .ts
  - .jsx
  - .tsx
  - .md
  - .sql
  - .yaml
  - .toml

# Folders to always skip
skip_folders:
  - node_modules
  - .git
  - __pycache__
  - .venv
  - venv
  - dist
  - build
  - .next
  - .obsidian
  - .trash

# Models
embed_model: mxbai-embed-large
chat_model: deepseek-r1:14b

# Retrieval — how many chunks to pull per query
top_k: 6

# Chunking
chunk_size: 800
chunk_overlap: 150
